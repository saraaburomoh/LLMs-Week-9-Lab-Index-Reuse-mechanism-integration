# === Step 5: Strictly Separated Task Definitions ===

analyze_user_task:
  description: >
    Step 1 [KNOWLEDGE]: Retrieve definitions for "Active User Subset", "elite", and "compliments".
    (Retrieve dictionary definitions for these terms from the knowledge base).
    (Then, once definitions are understood, proceed to lookup data for user {user_id})
    
    
    Step 2 [DATA]: Use `lookup_user_by_id` for user {user_id}. 
    
    Step 3 [HISTORY]: Use `lookup_reviews_by_user_id` for history.
  expected_output: >
    A markdown report including the meaning of their compliments and Elite status.
  agent: user_analyst

analyze_item_task:
  description: >
    Step 1 [KNOWLEDGE]: Retrieve definitions for "Entity Item Subset", "attributes", "WiFi", and "Parking".
    (Retrieve dictionary definitions for these terms from the knowledge base).
    (Then, once definitions are understood, proceed to lookup data for business {item_id})
    
    Step 2 [DATA]: Use `lookup_item_by_id` for business {item_id}.
    
    Step 3 [HISTORY]: Use `lookup_reviews_by_business_id` for feedback.
  expected_output: >
    A markdown report explaining the business features and attributes.
  agent: item_analyst

web_research_task:
  description: >
    Step 1: Look at the ITEM REPORT in your context to find the actual name of the business with ID {item_id}.
    
    Step 2: Search the internet for any status (open/closed), or trends about that specific business.

    ITEM REPORT:
    {item_context}
  expected_output: >
    A summary of external findings regarding the business.
  agent: web_researcher

predict_review_task:
  description: >
    Using the following data, predict the Stars (1.0 to 5.0) and write the Review Text for user {user_id} and business {item_id}.

    USER PROFILE:
    {user_context}

    ITEM REPORT:
    {item_context}

    WEB RESEARCH / TRENDS:
    {web_context}

    CRITICAL: Use the ACTUAL NAME of the business instead of the ID ({item_id}).
    Tone: Match the writing style and rating habits found in the USER PROFILE.
  expected_output: >
    Output ONLY a valid JSON object. Example: {"stars": 4.5, "review": "The atmosphere was great..."}
  agent: prediction_modeler
